
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@600&display=swap');
.rb { font-family: 'Cinzel', 'Trajan Pro', 'Times New Roman', serif; }
.rb-sub { font-family: 'Cormorant Garamond', 'Garamond', serif; }
</style>
<svg width="100%" viewBox="0 0 680 440" role="img">
  <title>Rumbo Baires logo formal centrado</title>
  <desc>Logo minimalista RB perfectamente centrado en el círculo</desc>

  <circle cx="340" cy="195" r="160" fill="#0D1B2A"/>
  <circle cx="340" cy="195" r="160" fill="none" stroke="#F5A623" stroke-width="2.5"/>
  <circle cx="340" cy="195" r="152" fill="none" stroke="#F5A623" stroke-width="0.6" opacity="0.3"/>

  <!-- RB centrado exactamente en cy=195 del círculo -->
  <!-- texto grande ocupa ~90px de alto, centro visual en y=195 -->
  <text x="340" y="195"
    text-anchor="middle"
    dominant-baseline="central"
    class="rb"
    font-size="130"
    font-weight="700"
    letter-spacing="10">
    <tspan fill="#ffffff">R</tspan><tspan fill="#F5A623">B</tspan>
  </text>

  <!-- Texto pequeño debajo dentro del círculo -->
  <text x="340" y="300"
    text-anchor="middle"
    class="rb-sub"
    font-size="11.5"
    fill="#F5A623"
    letter-spacing="6"
    opacity="0.85">RUMBO BAIRES</text>

  <line x1="218" y1="296" x2="264" y2="296" stroke="#F5A623" stroke-width="0.7" opacity="0.4"/>
  <line x1="416" y1="296" x2="462" y2="296" stroke="#F5A623" stroke-width="0.7" opacity="0.4"/>

</svg>
